{# Single portfolio-row partial for HTMX Untrack swaps (ARG-139). #}
<tr class="portfolio-row" id="portfolio-row-{{ item.id }}">
  <td class="portfolio-row__title">{{ item.title }}</td>
  <td>
    {% if item.status %}
      <span class="badge badge--{{ item.status.value|lower }}">{{ item.status.value }}</span>
    {% endif %}
  </td>
  <td>
    <button hx-post="/assets/{{ item.id }}/untrack"
            hx-target="#portfolio-row-{{ item.id }}"
            hx-swap="outerHTML">Untrack</button>
  </td>
</tr>
